<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | SMCPP</title>
    <style>
      body {
        background-color: #2c3e50;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }
      .login-box {
        background: white;
        padding: 40px 30px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        width: 350px;
        text-align: center;
      }
      .login-box h2 {
        margin-bottom: 25px;
        color: #2c3e50;
        border: none;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn:hover {
        background-color: #2980b9;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>🔐 Acceso al Sistema</h2>
      <h4 style="margin-bottom: 20px; color: #666">
        SMCPP - Prácticas Pre-Profesionales
      </h4>

      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label>Usuario:</label>
          {{ form.username }}
        </div>

        <div class="form-group">
          <label>Contraseña:</label>
          {{ form.password }}
        </div>

        <button type="submit" class="btn">Ingresar</button>
      </form>
    </div>
  </body>
</html>
